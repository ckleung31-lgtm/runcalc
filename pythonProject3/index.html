<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>跑步儀表板</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>🏃 跑步儀表板</h2>

<label>每週跑量 (km)</label>
<input type="number" id="mileage" placeholder="例如 50" value="50">

<label>每週訓練日數（例如 4 或 4-6）</label>
<input id="days" placeholder="4" value="5">

<label>年齡</label>
<input id="age" type="number" placeholder="35" value="35">

<label>性別</label>
<select id="gender">
  <option value="male">男性</option>
  <option value="female">女性</option>
  <option value="prefer_not">不便透露</option>
</select>

<label>配速基準</label>
<select id="paceBasis">
  <option value="training">最近訓練平均配速</option>
  <option value="race">最近比賽時間</option>
</select>

<div id="trainingPaceBox">
  <label>平均配速 (mm:ss)</label>
  <input id="trainingPace" placeholder="6:00" value="6:00">
  <div class="hint">💡 包括輕鬆跑、節奏跑、長課等所有課表嘅一週平均配速（唔係PB）</div>
</div>

<div id="racePaceBox" style="display:none;">
  <label>比賽距離</label>
  <select id="raceDist">
    <option value="5K">5K</option>
    <option value="10K">10K</option>
    <option value="HM">半馬</option>
    <option value="FM">全馬</option>
  </select>
  <label>完成時間</label>
  <input type="text" id="raceTime" placeholder="例如 4530 或 45:30" value="48:00">
  <div class="hint">💡 直接輸入數字，系統自動轉換（例如 4530 = 45分30秒）</div>
</div>

<label>心率方法</label>
<select id="method">
  <option value="basic">220 - age</option>
  <option value="karvonen">Karvonen (儲備心率)</option>
</select>

<div id="karvonenBox" style="display:none;">
  <label>Max HR</label>
  <input id="maxHr" type="number" placeholder="190">
  <label>Rest HR</label>
  <input id="restHr" type="number" placeholder="60">
</div>

<hr>

<div class="mode-options">
  <div class="mode-item">
    <label class="mode-label">
      <input type="checkbox" id="summerMode">
      <span>☀️ 夏季模式</span>
    </label>
    <div class="mode-hint">香港夏天適用（配速自動慢4%）</div>
  </div>
</div>

<hr>

<label>目標</label>
<select id="goal">
  <option value="5K">5K</option>
  <option value="10K">10K</option>
  <option value="HM">半馬 (HM)</option>
  <option value="FM">全馬 (FM)</option>
</select>

<div id="weeksHint"></div>

<label>訓練週數</label>
<input id="weeks" type="number" placeholder="8" value="12">

<button id="calculateBtn">📊 計算訓練計劃</button>

<div style="display: flex; gap: 12px; margin: 12px 0;">
  <button id="exportIcsBtn" class="secondary-btn">📅 匯出 .ics (日曆)</button>
  <button id="resetStorageBtn" class="secondary-btn danger">🗑️ 重置所有設定</button>
</div>

<div id="result" class="result-card"></div>

</div>

<script src="script.js"></script>
</body>
</html>
